<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The all in one Downloader, - Hadi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;
    color: white;
    overflow-x: hidden;
}

#bg {
    position: fixed;
    inset: 0;
    z-index: -1;
}

.container {
    padding: 60px 20px;
    max-width: 1100px;
    margin: auto;
    animation: loadIn 1.2s ease forwards;
}

@keyframes loadIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Typing title */
h1 {
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    border-right: 3px solid rgba(255,255,255,0.6);
    width: 0;
    animation: typing 2.8s steps(40,end) forwards, blink 0.8s infinite;
}

@keyframes typing {
    to { width: 100%; }
}

@keyframes blink {
    50% { border-color: transparent; }
}

.subtitle {
    opacity: 0.6;
    margin-bottom: 55px;
}

/* Buttons */
.button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 25px;
}

.btn {
    padding: 22px;
    border-radius: 22px;
    font-size: 1.05rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    color: white;
    backdrop-filter: blur(18px);
    transition: all 0.35s ease;
    box-shadow: 0 0 0 rgba(0,0,0,0);
}

.btn:hover {
    transform: translateY(-8px) scale(1.03);
}

/* Button color themes */
.spotify {
    background: linear-gradient(135deg, #1db954, #1ed760);
}
.spotify:hover {
    box-shadow: 0 0 35px rgba(30,215,96,0.6);
}

.youtube {
    background: linear-gradient(135deg, #ff0033, #ff5f5f);
}
.youtube:hover {
    box-shadow: 0 0 35px rgba(255,0,51,0.6);
}

.transfer {
    background: linear-gradient(135deg, #7f00ff, #c77dff);
}
.transfer:hover {
    box-shadow: 0 0 35px rgba(183,130,255,0.6);
}

.movies {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
}
.movies:hover {
    box-shadow: 0 0 35px rgba(0,114,255,0.6);
}

.games {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: black;
}
.games:hover {
    box-shadow: 0 0 35px rgba(255,210,0,0.6);
}

/* Secret typing */
#typed {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    letter-spacing: 4px;
    opacity: 0.35;
    transition: all 0.6s ease;
    pointer-events: none;
}

#typed.active {
    top: 18px;
    left: 18px;
    transform: none;
    opacity: 0.7;
}

#status {
    position: fixed;
    top: 55px;
    left: 18px;
    color: #ff5c5c;
    font-size: 0.95rem;
}

/* Secret page */
#secretPage {
    display: none;
    padding: 60px 20px;
    text-align: center;
    animation: loadIn 1s ease forwards;
}

.secret-buttons {
    max-width: 420px;
    margin: 40px auto;
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.gradient-btn {
    padding: 24px;
    font-size: 1.3rem;
    font-weight: 700;
    border-radius: 24px;
    border: none;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.gradient-btn:hover {
    transform: scale(1.06);
}

.beeg {
    background: linear-gradient(135deg, #7f00ff, #00c6ff);
}
.ph {
    background: linear-gradient(135deg, #000000, #ff7a00);
}
.pt {
    background: linear-gradient(135deg, #ffffff, #b983ff);
    color: black;
}

@media (max-width: 600px) {
    h1 { font-size: 2.2rem; }
}
</style>
</head>

<body>

<div id="bg"></div>

<div class="container" id="mainPage">
    <h1>The all in one downloader – hadi</h1>
    <div class="subtitle">everything. one place.</div>

    <div class="button-grid">
        <button class="btn spotify" onclick="window.open('https://spotidownloader.com/en14','_blank')">Spotify downloader</button>
        <button class="btn youtube" onclick="window.open('https://v6.www-y2mate.com/','_blank')">Youtube downloader</button>
        <button class="btn transfer" onclick="window.open('https://www.tunemymusic.com/','_blank')">Transfer music</button>
        <button class="btn movies" onclick="window.open('https://pahe.ink','_blank')">Movie/show downloader</button>
        <button class="btn games" onclick="window.open('https://fitgirl-repacks.site/','_blank')">Games downloader</button>
    </div>
</div>

<div id="typed"></div>
<div id="status"></div>

<div id="secretPage">
    <h1>Access granted</h1>
    <div class="secret-buttons">
        <button class="gradient-btn beeg" onclick="window.open('https://beeg.com','_blank')">beeg</button>
        <button class="gradient-btn ph" onclick="window.open('https://pornhub.com','_blank')">PH</button>
        <button class="gradient-btn pt" onclick="window.open('https://www.dinotube.com/','_blank')">PT</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>

<script>
VANTA.DOTS({
    el: "#bg",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    color: 0xb983ff,
    color2: 0x7f00ff,
    backgroundColor: 0x0b0615,
    spacing: 32,
    size: 3.2
});

let buffer = "";
const typed = document.getElementById("typed");
const status = document.getElementById("status");

document.addEventListener("keydown", e => {
    typed.classList.add("active");

    if (e.key === "Enter") {
        if (buffer.toLowerCase() === "zorocem") {
            document.getElementById("mainPage").style.display = "none";
            document.getElementById("secretPage").style.display = "block";
        } else {
            status.innerHTML = '<span class="material-icons">close</span> Incorrect';
            buffer = "";
            typed.textContent = "";
        }
        return;
    }

    if (e.key === "Backspace") {
        buffer = buffer.slice(0, -1);
    } else if (e.key.length === 1) {
        buffer += e.key;
    }

    typed.textContent = buffer;
});
</script>

</body>
</html>
