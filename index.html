<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hadi | All-In-One</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --spotify: 29, 185, 84;
            --youtube: 255, 0, 51;
            --fmhy: 127, 0, 255;
            --movies: 0, 198, 255;
            --games: 247, 151, 30;
            --apk: 0, 176, 155;
            --gta: 255, 140, 0;
            --minecraft: 56, 142, 60;
            --netflix: 229, 9, 20;

            --spotify-g: linear-gradient(135deg, rgba(var(--spotify), 0.2), rgba(var(--spotify), 0.05));
            --youtube-g: linear-gradient(135deg, rgba(var(--youtube), 0.2), rgba(var(--youtube), 0.05));
            --fmhy-g: linear-gradient(135deg, rgba(var(--fmhy), 0.2), rgba(var(--fmhy), 0.05));
            --movies-g: linear-gradient(135deg, rgba(var(--movies), 0.2), rgba(var(--movies), 0.05));
            --games-g: linear-gradient(135deg, rgba(var(--games), 0.2), rgba(var(--games), 0.05));
            --apk-g: linear-gradient(135deg, rgba(var(--apk), 0.2), rgba(var(--apk), 0.05));
            --gta-g: linear-gradient(135deg, rgba(var(--gta), 0.3), rgba(var(--gta), 0.1));
            --minecraft-g: linear-gradient(135deg, rgba(var(--minecraft), 0.2), rgba(var(--minecraft), 0.05));
            --netflix-g: linear-gradient(135deg, rgba(var(--netflix), 0.2), rgba(var(--netflix), 0.05));

            --mica-bg: rgba(255, 255, 255, 0.015);
            --mica-border: rgba(255, 255, 255, 0.08);
            --mica-blur: blur(40px) saturate(220%);
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; min-height: 100vh; color: white; overflow-x: hidden; background: #0b0615; }
        #bg { position: fixed; inset: 0; z-index: -1; }
        .container { padding: 40px 24px; max-width: 1100px; margin: auto; }
        header { margin-bottom: 30px; }
        h1 {
            font-size: clamp(1.4rem, 7vw, 2.8rem);
            font-weight: 900;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid rgba(185, 131, 255, 0.5);
            width: 0;
            animation: typing 2s steps(30) forwards, blink 0.8s infinite;
        }
        @keyframes typing { to { width: 100%; } }
        @keyframes blink { 50% { border-color: transparent; } }
        .version-text { opacity: 0.4; font-size: 0.85rem; letter-spacing: 1px; user-select: none; cursor: pointer; }
        .button-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }

        .btn {
            padding: 22px; border-radius: 26px; border: 1px solid var(--mica-border);
            cursor: pointer; color: white; text-align: left; position: relative;
            transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1), background-color 0.3s, box-shadow 0.3s ease;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            display: flex; flex-direction: column; gap: 8px; overflow: hidden;
            backdrop-filter: var(--mica-blur); -webkit-backdrop-filter: var(--mica-blur); background-color: var(--mica-bg);
            box-shadow: 0 4px 24px 0 rgba(0, 0, 0, 0.3);
        }
        
        @keyframes bounceIn { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .btn:hover { transform: translateY(-8px) scale(1.03); border-color: rgba(255, 255, 255, 0.3); }
        .btn:active { transform: scale(0.96); }

        .ripple {
            position: absolute; background: rgba(255, 255, 255, 0.3); border-radius: 50%;
            transform: scale(0); animation: ripple-animation 0.4s ease-out; pointer-events: none;
            left: var(--x); top: var(--y); width: 100px; height: 100px; margin-left: -50px; margin-top: -50px;
        }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }
        
        .btn i { font-size: 2rem; opacity: 0.8; }
        .btn span { font-weight: 800; font-size: 1.15rem; }
        .btn p { margin: 0; font-size: 0.8rem; opacity: 0.6; line-height: 1.4; }
        
        .spotify { background-image: var(--spotify-g); }
        .youtube { background-image: var(--youtube-g); }
        .fmhy { background-image: var(--fmhy-g); }
        .movies { background-image: var(--movies-g); }
        .games { background-image: var(--games-g); }
        .apk { background-image: var(--apk-g); }
        .gta { background-image: var(--gta-g); color: #ffae42; }
        .gta p { color: rgba(255, 174, 66, 0.8); }
        .minecraft { background-image: var(--minecraft-g); }
        .netflix { background-image: var(--netflix-g); }

        .spotify:hover { box-shadow: 0 15px 45px rgba(var(--spotify), 0.3); }
        .youtube:hover { box-shadow: 0 15px 45px rgba(var(--youtube), 0.3); }
        .fmhy:hover { box-shadow: 0 15px 45px rgba(var(--fmhy), 0.3); }
        .movies:hover { box-shadow: 0 15px 45px rgba(var(--movies), 0.3); }
        .games:hover { box-shadow: 0 15px 45px rgba(var(--games), 0.3); }
        .apk:hover { box-shadow: 0 15px 45px rgba(var(--apk), 0.3); }
        .gta:hover { box-shadow: 0 15px 45px rgba(var(--gta), 0.3); }
        .minecraft:hover { box-shadow: 0 15px 45px rgba(var(--minecraft), 0.3); }
        .netflix:hover { box-shadow: 0 15px 45px rgba(var(--netflix), 0.3); }

        #typing-feedback { 
            position: fixed; bottom: 30px; left: 30px; font-family: monospace; 
            color: #b983ff; font-size: 1.1rem; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 10px; 
            border-left: 4px solid #b983ff; font-weight: bold; pointer-events: none; 
            opacity: 0; transition: opacity 0.3s ease; z-index: 100;
        }
        #typing-feedback.active { opacity: 1; }
        
        #secretPage { display: none; padding: 60px 20px; text-align: center; }
        .secret-btn {
            display: block; width: 100%; max-width: 400px; margin: 15px auto;
            padding: 22px; border-radius: 20px; font-weight: 900; font-size: 1.4rem;
            text-decoration: none; transition: 0.3s;
            backdrop-filter: var(--mica-blur); -webkit-backdrop-filter: var(--mica-blur);
            border: 1px solid var(--mica-border);
        }
        .ph { background: linear-gradient(90deg, rgba(0, 0, 0, 0.5), rgba(var(--games), 0.2)); color: white; }

        @media (max-width: 600px) {
            .container { padding: 30px 15px; } h1 { font-size: 1.35rem; }
            .button-grid { grid-template-columns: 1fr; gap: 12px; }
            .btn { padding: 18px 20px; border-radius: 20px; background-color: rgba(255, 255, 255, 0.01) !important; }
        }
    </style>
</head>
<body onclick="unlockAudio()">
<div id="bg"></div>
<div class="container" id="mainPage">
    <header>
        <h1>The all in one downloader – hadi</h1>
        <p class="version-text" ondblclick="triggerVault()">v4.4 revamp - powered by <span id="trigger">cemduo</span></p>
    </header>
    <div class="button-grid">
        <button class="btn netflix" onclick="fastOpen('https://net22.cc/home', event, this)">
            <i class="material-icons">live_tv</i><span>Netflix Free</span><p>Premium streaming.</p></button>
        <button class="btn minecraft" onclick="fastOpen('https://dl.mcpelife.com/minecraft-pe/1-26-3-1/minecraft-1.26.3.1-arm64-v8a.apk', event, this)">
            <i class="material-icons">layers</i><span>Minecraft PE</span><p>v1.26.3.1 Official.</p></button>
        <button class="btn fmhy" onclick="fastOpen('https://fmhy.net/', event, this)">
            <i class="material-icons">language</i><span>FMHY.net</span><p>Global megathread.</p></button>
        <button class="btn gta" onclick="fastOpen('https://mega.nz/file/JtATDKSA#ghftzzoPblrZOjnQ_x5GrNSiRdVvIZIwX7zaMMY3Ovw', event, this)">
            <i class="material-icons">smartphone</i><span>GTA V Android</span><p>Full experience mobile.</p></button>
        <button class="btn spotify" onclick="fastOpen('https://spotidownloader.com/en14', event, this)">
            <i class="material-icons">music_note</i><span>Spotify DL</span><p>Playlist rip.</p></button>
        <button class="btn youtube" onclick="fastOpen('https://v6.www-y2mate.com/', event, this)">
            <i class="material-icons">play_circle</i><span>YouTube 4K</span><p>Fast convert.</p></button>
        <button class="btn movies" onclick="fastOpen('https://pahe.ink', event, this)">
            <i class="material-icons">movie_filter</i><span>Movie Downloader</span><p>Pahe.ink high-quality.</p></button>
        <button class="btn apk" onclick="fastOpen('https://apkpure.net/', event, this)">
            <i class="material-icons">shop</i><span>APKPure</span><p>Region-free clean APKs.</p></button>
        <button class="btn games" onclick="fastOpen('https://fitgirl-repacks.site/', event, this)">
            <i class="material-icons">videogame_asset</i><span>Game Repacks</span><p>FitGirl's library.</p></button>
    </div>
</div>
<div id="typing-feedback"></div>
<div id="secretPage">
    <h1>ACCESS GRANTED</h1>
    <a href="https://beeg.com" class="secret-btn" style="background: linear-gradient(90deg, rgba(var(--fmhy), 0.3), rgba(var(--movies), 0.3)); color: white;">BEEG</a>
    <a href="https://pornhub.com" class="secret-btn ph">PH</a>
    <button onclick="location.reload()" style="background:none; border: 1px solid white; color:white; padding:12px 25px; border-radius:12px; cursor:pointer; margin-top:30px; font-weight:700;">EXIT VAULT</button>
</div>

<audio id="clickSound" src="https://www.fesliyanstudios.com/play-mp3/6682" preload="auto"></audio>
<audio id="auroraAmbience" src="https://raw.githubusercontent.com/portonvpn/Allinone/main/aurora.mp3" loop preload="auto"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
<script>
VANTA.DOTS({ el: "#bg", mouseControls: true, touchControls: true, color: 0xb983ff, color2: 0x7f00ff, backgroundColor: 0x0b0615, spacing: 32, size: 3.2 });

let audioUnlocked = false;
function unlockAudio() {
    if (audioUnlocked) return;
    const bgMusic = document.getElementById("auroraAmbience");
    bgMusic.play().then(() => { audioUnlocked = true; }).catch(e => console.log("Waiting for user click..."));
}

function fastOpen(url, e, el) {
    unlockAudio();
    const sound = document.getElementById("clickSound");
    sound.currentTime = 0; sound.play().catch(() => {});
    const rect = el.getBoundingClientRect();
    const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
    const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
    const ripple = document.createElement("span");
    ripple.classList.add("ripple");
    ripple.style.setProperty('--x', x + 'px'); ripple.style.setProperty('--y', y + 'px');
    el.appendChild(ripple);
    setTimeout(() => { ripple.remove(); window.open(url, '_blank'); }, 150);
}

function triggerVault() {
    let pass = prompt("Enter Vault Key:");
    if(pass && pass.toLowerCase() === "cemduo") {
        document.getElementById("mainPage").style.display = "none";
        document.getElementById("secretPage").style.display = "block";
    }
}

let buffer = "";
const feedback = document.getElementById("typing-feedback");
document.addEventListener("keydown", e => {
    feedback.classList.add("active");
    if (e.key === "Enter") {
        if (buffer.toLowerCase() === "cemduo") {
            document.getElementById("mainPage").style.display = "none";
            document.getElementById("secretPage").style.display = "block";
        } else {
            feedback.textContent = "AUTH DENIED";
            setTimeout(() => { feedback.textContent = ""; feedback.classList.remove("active"); }, 1000);
            buffer = "";
        }
        return;
    }
    if (e.key === "Backspace") { buffer = buffer.slice(0, -1); } 
    else if (e.key.length === 1) { buffer += e.key; }
    feedback.textContent = "> " + buffer.toUpperCase();
    clearTimeout(window.typeTimer);
    window.typeTimer = setTimeout(() => { buffer = ""; feedback.textContent = ""; feedback.classList.remove("active"); }, 3000);
});
</script>
</body>
</html>
