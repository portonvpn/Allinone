<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hadi | All-In-One</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --spotify: 29, 185, 84; --youtube: 255, 0, 51; --fmhy: 127, 0, 255;
            --movies: 0, 198, 255; --games: 247, 151, 30; --apk: 0, 176, 155;
            --gta: 255, 140, 0; --minecraft: 56, 142, 60; --netflix: 229, 9, 20;
            --yt-premium-red: 200, 0, 0; --yt-premium-dark: 15, 15, 15;
            --mica-bg: rgba(255, 255, 255, 0.02);
            --mica-border: rgba(255, 255, 255, 0.1);
            --mica-blur: blur(50px) saturate(220%);
        }

        /* ANTI-HIGHLIGHT DEFENSE */
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent !important; outline: none !important; }
        ::selection { background: transparent !important; }

        body { margin: 0; min-height: 100vh; color: white; overflow-x: hidden; background: #0b0615; }
        #bg { position: fixed; inset: 0; z-index: -1; }
        .container { padding: 40px 24px; max-width: 1100px; margin: auto; }
        
        #vaultTrigger { cursor: pointer; user-select: none !important; -webkit-user-select: none !important; display: inline-block; color: #b983ff; font-weight: 700; }

        header { margin-bottom: 30px; }
        h1 { font-size: clamp(1.4rem, 7vw, 2.8rem); font-weight: 900; margin: 0; white-space: nowrap; overflow: hidden; border-right: 3px solid rgba(185, 131, 255, 0.5); width: 0; animation: typing 2s steps(30) forwards, blink 0.8s infinite; }
        @keyframes typing { to { width: 100%; } }
        @keyframes blink { 50% { border-color: transparent; } }

        .button-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

        .btn {
            padding: 22px; border-radius: 26px; border: 1px solid var(--mica-border);
            cursor: pointer; color: white; text-align: left; position: relative;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: bounceIn 0.8s both; display: flex; flex-direction: column; gap: 12px;
            overflow: hidden; backdrop-filter: var(--mica-blur); -webkit-backdrop-filter: var(--mica-blur);
            background-color: var(--mica-bg); box-shadow: 0 4px 24px 0 rgba(0, 0, 0, 0.3);
        }
        .btn.focused, .btn:hover { transform: scale(1.08) translateY(-10px); border-color: rgba(255, 255, 255, 0.5); background-color: rgba(255, 255, 255, 0.08); z-index: 10; }
        @keyframes bounceIn { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .btn i { font-size: 2.4rem; opacity: 0.8; transition: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center; height: 40px; }
        .btn.focused i, .btn:hover i { transform: scale(1.15) translateY(-5px) rotate(-3deg); opacity: 1; }
        .btn span { font-weight: 800; font-size: 1.15rem; }
        .btn p { margin: 0; font-size: 0.8rem; opacity: 0.6; }

        /* Color-Matched Gradients */
        .yt-premium { background-image: linear-gradient(135deg, rgba(var(--yt-premium-red), 0.4), rgba(var(--yt-premium-dark), 0.8)); }
        .netflix { background-image: linear-gradient(135deg, rgba(var(--netflix), 0.3), rgba(var(--netflix), 0.05)); }
        .minecraft { background-image: linear-gradient(135deg, rgba(var(--minecraft), 0.3), rgba(var(--minecraft), 0.05)); }
        .fmhy { background-image: linear-gradient(135deg, rgba(var(--fmhy), 0.3), rgba(var(--fmhy), 0.05)); }
        .gta { background-image: linear-gradient(135deg, rgba(var(--gta), 0.4), rgba(var(--gta), 0.1)); color: #ffae42; }
        .spotify { background-image: linear-gradient(135deg, rgba(var(--spotify), 0.3), rgba(var(--spotify), 0.05)); }
        .youtube { background-image: linear-gradient(135deg, rgba(var(--youtube), 0.3), rgba(var(--youtube), 0.05)); }
        .movies { background-image: linear-gradient(135deg, rgba(var(--movies), 0.3), rgba(var(--movies), 0.05)); }
        .apk { background-image: linear-gradient(135deg, rgba(var(--apk), 0.3), rgba(var(--apk), 0.05)); }
        .games { background-image: linear-gradient(135deg, rgba(var(--games), 0.3), rgba(var(--games), 0.05)); }

        /* TERMINAL UI */
        #terminal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.88);
            backdrop-filter: blur(25px); z-index: 1000; display: none;
            align-items: center; justify-content: center;
        }
        #terminal-box {
            width: 90%; max-width: 400px; padding: 35px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        #terminal-box h2 { font-size: 0.9rem; opacity: 0.4; margin-bottom: 25px; letter-spacing: 3px; font-weight: 900; }
        #terminal-input { position: absolute; opacity: 0; pointer-events: none; }
        #terminal-display { font-family: monospace; font-size: 1.8rem; color: #b983ff; letter-spacing: 4px; }
        .blink { animation: cursorBlink 0.8s infinite; }
        @keyframes cursorBlink { 50% { opacity: 0; } }

        /* PAGES */
        #secretPage, #fakePage { display: none; padding: 60px 20px; text-align: center; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .secret-btn { display: block; width: 100%; max-width: 400px; margin: 15px auto; padding: 22px; border-radius: 20px; font-weight: 900; font-size: 1.4rem; text-decoration: none; transition: 0.3s; backdrop-filter: var(--mica-blur); border: 1px solid var(--mica-border); }
        
        /* Fake Page Styling */
        #fakePage h1 { width: 100%; border: none; font-size: 4rem; background: linear-gradient(to right, #ff00cc, #3333ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }
        
        .asaru-img {
            width: 100%; max-width: 300px; border-radius: 20px; margin: 30px 0;
            border: 5px solid rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(185, 131, 255, 0.4);
        }

        @media (max-width: 600px) {
            .container { padding: 30px 16px; } 
            .button-grid { grid-template-columns: 1fr; gap: 12px; }
            .btn { padding: 18px 20px; border-radius: 22px; }
        }
    </style>
</head>
<body onclick="unlockAudio()">
<div id="bg"></div>

    <div id="terminal-box" onclick="event.stopPropagation()">

    <div class="button-grid" id="grid">
        <button class="btn yt-premium" onmouseenter="syncFocus(0)" onmouseleave="clearFocus()" onclick="fastOpen('https://github.com/reisxd/TizenTubeCobalt/releases/download/v1.0.8/cobalt-arm64.apk', event, this)">

        <button class="btn fmhy" onmouseenter="syncFocus(3)" onmouseleave="clearFocus()" onclick="fastOpen('https://fmhy.net/', event, this)">
            <i class="material-icons">language</i><span>FMHY.net</span><p>Global megathread.</p></button>
        <button class="btn gta" onmouseenter="syncFocus(4)" onmouseleave="clearFocus()" onclick="fastOpen('https://mega.nz/file/JtATDKSA#ghftzzoPblrZOjnQ_x5GrNSiRdVvIZIwX7zaMMY3Ovw', event, this)">
            <i class="material-icons">smartphone</i><span>GTA V Android</span><p>Full experience mobile.</p></button>
        <button class="btn spotify" onmouseenter="syncFocus(5)" onmouseleave="clearFocus()" onclick="fastOpen('https://spotidownloader.com/en14', event, this)">

        <button class="btn movies" onmouseenter="syncFocus(7)" onmouseleave="clearFocus()" onclick="fastOpen('https://pahe.ink', event, this)">
            <i class="material-icons">movie_filter</i><span>Movie Downloader</span><p>Pahe.ink high-quality.</p></button>
        <button class="btn apk" onmouseenter="syncFocus(8)" onmouseleave="clearFocus()" onclick="fastOpen('https://apkpure.net/', event, this)">
            <i class="material-icons">shop</i><span>APKPure</span><p>Region-free clean APKs.</p></button>
        <button class="btn games" onmouseenter="syncFocus(9)" onmouseleave="clearFocus()" onclick="fastOpen('https://fitgirl-repacks.site/', event, this)">
            <i class="material-icons">videogame_asset</i><span>Game Repacks</span><p>FitGirl's library.</p></button>
    </div>
</div>

<div id="secretPage">
    <h1 style="border:none; width: 100%;">Secret access granted</h1>
    <a href="https://beeg.com" class="secret-btn" style="background: linear-gradient(90deg, rgba(127, 0, 255, 0.3), rgba(0, 198, 255, 0.3)); color: white;">BEEG</a>

    <button onclick="location.reload()" style="background:none; border: 1px solid white; color:white; padding:12px 25px; border-radius:12px; cursor:pointer; margin-top:30px; font-weight:700;">EXIT VAULT</button>

    <img src="https://raw.githubusercontent.com/portonvpn/Allinone/main/asaru.JPG" class="asaru-img" alt="Surprise">

<audio id="clickSound" src="https://www.fesliyanstudios.com/play-mp3/6682" preload="auto"></audio>
<audio id="typeSound" src="https://www.fesliyanstudios.com/play-mp3/6?id=2" preload="auto"></audio>
<audio id="auroraAmbience" src="https://raw.githubusercontent.com/portonvpn/Allinone/main/aurora.mp3" loop preload="auto"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
VANTA.DOTS({ el: "#bg", mouseControls: true, touchControls: true, color: 0xb983ff, color2: 0x7f00ff, backgroundColor: 0x0b0615, spacing: 32, size: 3.2 });

let audioUnlocked = false;
function unlockAudio() {
    if (audioUnlocked) return;
    const bgMusic = document.getElementById("auroraAmbience");
    bgMusic.play().then(() => { audioUnlocked = true; }).catch(e => {});
}

function fastOpen(url, e, el) {
    unlockAudio();
    const sound = document.getElementById("clickSound");
    sound.currentTime = 0; sound.volume = 0.5; sound.play().catch(() => {});
    window.open(url, '_blank');
}

// NAVIGATION
let currentIndex = -1;
const buttons = document.querySelectorAll('.btn');
function syncFocus(index) { buttons.forEach(btn => btn.classList.remove('focused')); currentIndex = index; if (index !== -1) buttons[index].classList.add('focused'); }
function clearFocus() { buttons.forEach(btn => btn.classList.remove('focused')); currentIndex = -1; }

document.addEventListener('keydown', (e) => {
    if (document.getElementById('terminal-overlay').style.display === 'flex') return;
    if (e.key === "Enter" && currentIndex !== -1) { buttons[currentIndex].click(); return; }
    const grid = document.getElementById('grid');
    const cols = window.getComputedStyle(grid).getPropertyValue('grid-template-columns').split(' ').length;
    if (e.key === 'ArrowRight') syncFocus(Math.min(currentIndex + 1, buttons.length - 1));
    else if (e.key === 'ArrowLeft') syncFocus(Math.max(currentIndex - 1, 0));
    else if (e.key === 'ArrowDown') syncFocus(currentIndex + cols < buttons.length ? currentIndex + cols : currentIndex);
    else if (e.key === 'ArrowUp') syncFocus(currentIndex - cols >= 0 ? currentIndex - cols : currentIndex);
});

// TERMINAL + HONEYPOT LOGIC
const terminal = document.getElementById('terminal-overlay');
const termInput = document.getElementById('terminal-input');
const termViz = document.getElementById('code-viz');

function openTerminal() { terminal.style.display = 'flex'; termInput.focus(); }
function closeTerminal() { terminal.style.display = 'none'; termInput.value = ''; termViz.textContent = ''; }

termInput.addEventListener('input', (e) => {
    termViz.textContent = e.target.value.toUpperCase();
    const tSound = document.getElementById("typeSound");
    tSound.currentTime = 0; tSound.volume = 0.2; tSound.play().catch(() => {});
});

termInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const code = termInput.value.toLowerCase();
        if (code === 'gamdom') {
            document.getElementById("mainPage").style.display = "none";
            document.getElementById("secretPage").style.display = "block";
            closeTerminal();
        } else if (code === 'cemduo') {
            document.getElementById("mainPage").style.display = "none";
            document.getElementById("fakePage").style.display = "block";
            closeTerminal();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            termViz.style.color = 'red';
            setTimeout(() => { termViz.style.color = '#b983ff'; termInput.value = ''; termViz.textContent = ''; }, 500);
        }
    }
    if (e.key === 'Escape') closeTerminal();
});

// VAULT TRIGGER: MOBILE & PC
document.getElementById('vaultTrigger').ondblclick = openTerminal;
let lastTap = 0;
document.getElementById('vaultTrigger').addEventListener('touchstart', (e) => {
    let now = Date.now();
    if (now - lastTap < 300) { e.preventDefault(); openTerminal(); }
    lastTap = now;
});
</script>
</body>
</html>
