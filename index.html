<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hadi | All-In-One</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --spotify: linear-gradient(135deg, #1db954, #1ed760);
            --youtube: linear-gradient(135deg, #ff0033, #ff5f5f);
            --fmhy: linear-gradient(135deg, #7f00ff, #c77dff);
            --movies: linear-gradient(135deg, #00c6ff, #0072ff);
            --games: linear-gradient(135deg, #f7971e, #ffd200);
            --apk: linear-gradient(135deg, #00b09b, #96c93d);
            --gta: linear-gradient(135deg, #ff8c00, #ffae42);
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; min-height: 100vh; color: white; overflow-x: hidden; background: #0b0615; }
        #bg { position: fixed; inset: 0; z-index: -1; }
        .container { padding: 60px 24px; max-width: 1100px; margin: auto; }
        header { margin-bottom: 40px; }
        h1 {
            font-size: clamp(1.4rem, 7vw, 3rem);
            font-weight: 900;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid rgba(255,255,255,0.7);
            width: 0;
            animation: typing 2s steps(30) forwards, blink 0.8s infinite;
        }
        @keyframes typing { to { width: 100%; } }
        @keyframes blink { 50% { border-color: transparent; } }
        
        .version-text { 
            opacity: 0.5; 
            letter-spacing: 1px; 
            user-select: none; 
            -webkit-user-select: none; 
            cursor: pointer;
        }

        .button-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
        .btn {
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            color: white;
            text-align: left;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1);
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
            backdrop-filter: blur(12px);
        }
        @keyframes bounceIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.4s ease-out;
            pointer-events: none;
            left: var(--x);
            top: var(--y);
            width: 100px;
            height: 100px;
            margin-left: -50px;
            margin-top: -50px;
        }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }
        .btn i { font-size: 2.2rem; opacity: 0.9; }
        .btn span { font-weight: 800; font-size: 1.2rem; }
        .btn p { margin: 0; font-size: 0.85rem; opacity: 0.7; line-height: 1.4; }
        .spotify { background: var(--spotify); }
        .youtube { background: var(--youtube); }
        .fmhy { background: var(--fmhy); }
        .movies { background: var(--movies); }
        .games { background: var(--games); }
        .apk { background: var(--apk); }
        .gta { background: var(--gta); color: black; }
        .gta p { color: rgba(0,0,0,0.7); }
        
        #typing-feedback { 
            position: fixed; bottom: 30px; left: 30px; font-family: monospace; 
            color: #b983ff; font-size: 1.1rem; background: rgba(0,0,0,0.6);
            padding: 8px 15px; border-radius: 10px; border-left: 4px solid #b983ff;
            font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 100;
        }
        #typing-feedback.active { opacity: 1; }
        #secretPage { display: none; padding: 60px 20px; text-align: center; }
        .secret-btn {
            display: block; width: 100%; max-width: 400px; margin: 15px auto;
            padding: 22px; border-radius: 20px; font-weight: 900; font-size: 1.4rem;
            text-decoration: none; transition: 0.3s;
        }
        .beeg { background: linear-gradient(90deg, #7f00ff, #00c6ff); color: white; }
        .ph { background: linear-gradient(90deg, #000, #ff7a00); color: white; }
        @media (max-width: 600px) {
            .container { padding: 30px 15px; }
            h1 { font-size: 1.35rem; }
            .button-grid { grid-template-columns: 1fr; gap: 12px; }
            .btn { 
                padding: 16px 20px; border-radius: 18px; 
                background: rgba(185, 131, 255, 0.08) !important;
                border: 1px solid rgba(185, 131, 255, 0.2);
                color: white !important;
            }
            .btn i { font-size: 1.6rem; color: #b983ff; }
            .btn p { color: rgba(255,255,255,0.6) !important; }
        }
    </style>
</head>
<body>
<div id="bg"></div>
<div class="container" id="mainPage">
    <header>
        <h1>The all in one downloader – hadi</h1>
        <p class="version-text" ondblclick="triggerVault()">v4.3 - powered by <span id="trigger">cemduo</span></p>
    </header>
    <div class="button-grid">
        <button class="btn fmhy" onclick="fastOpen('https://fmhy.net/', event, this)">
            <i class="material-icons">language</i>
            <span>FMHY.net</span>
            <p>Everything you'll ever need in one place.</p>
        </button>
        <button class="btn gta" onclick="fastOpen('https://mega.nz/file/JtATDKSA#ghftzzoPblrZOjnQ_x5GrNSiRdVvIZIwX7zaMMY3Ovw', event, this)">
            <i class="material-icons">smartphone</i>
            <span>GTA V Android</span>
            <p>Full experience optimized for mobile.</p>
        </button>
        <button class="btn spotify" onclick="fastOpen('https://spotidownloader.com/en14', event, this)">
            <i class="material-icons">music_note</i>
            <span>Spotify DL</span>
            <p>Quick music & playlist extraction.</p>
        </button>
        <button class="btn youtube" onclick="fastOpen('https://v6.www-y2mate.com/', event, this)">
            <i class="material-icons">play_circle</i>
            <span>YouTube 4K</span>
            <p>Video and MP3 conversions.</p>
        </button>
        <button class="btn movies" onclick="fastOpen('https://pahe.ink', event, this)">
            <i class="material-icons">movie</i>
            <span>Movie Vault</span>
            <p>High quality encodes from Pahe.</p>
        </button>
        <button class="btn apk" onclick="fastOpen('https://apkpure.net/', event, this)">
            <i class="material-icons">shop</i>
            <span>APKPure</span>
            <p>Clean APKs & region-unlocks.</p>
        </button>
        <button class="btn games" onclick="fastOpen('https://fitgirl-repacks.site/', event, this)">
            <i class="material-icons">videogame_asset</i>
            <span>Game Repacks</span>
            <p>Compressed games by FitGirl.</p>
        </button>
    </div>
</div>
<div id="typing-feedback"></div>
<div id="secretPage">
    <h1 style="border:none; width: 100%;">ACCESS GRANTED</h1>
    <a href="https://beeg.com" class="secret-btn beeg">BEEG</a>
    <a href="https://pornhub.com" class="secret-btn ph">PH</a>
    <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; padding:15px; border-radius:10px; cursor:pointer; margin-top:40px;">EXIT</button>
</div>
<audio id="clickSound" src="https://www.fesliyanstudios.com/play-mp3/6682" preload="auto"></audio>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
<script>
VANTA.DOTS({ el: "#bg", mouseControls: true, touchControls: true, color: 0xb983ff, color2: 0x7f00ff, backgroundColor: 0x0b0615, spacing: 32, size: 3.2 });
function fastOpen(url, e, el) {
    const sound = document.getElementById("clickSound");
    sound.currentTime = 0;
    sound.play().catch(() => {});
    const rect = el.getBoundingClientRect();
    const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
    const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
    const ripple = document.createElement("span");
    ripple.classList.add("ripple");
    ripple.style.setProperty('--x', x + 'px');
    ripple.style.setProperty('--y', y + 'px');
    el.appendChild(ripple);
    setTimeout(() => ripple.remove(), 400);
    window.open(url, '_blank');
}
let buffer = "";
const feedback = document.getElementById("typing-feedback");
function triggerVault() {
    let pass = prompt("Enter Vault Key:");
    if(pass && pass.toLowerCase() === "cemduo") {
        document.getElementById("mainPage").style.display = "none";
        document.getElementById("secretPage").style.display = "block";
    }
}
document.addEventListener("keydown", e => {
    feedback.classList.add("active");
    if (e.key === "Enter") {
        if (buffer.toLowerCase() === "cemduo") {
            document.getElementById("mainPage").style.display = "none";
            document.getElementById("secretPage").style.display = "block";
        } else {
            feedback.textContent = "DENIED";
            setTimeout(() => { feedback.textContent = ""; feedback.classList.remove("active"); }, 1000);
            buffer = "";
        }
        return;
    }
    if (e.key === "Backspace") { buffer = buffer.slice(0, -1); } 
    else if (e.key.length === 1) { buffer += e.key; }
    feedback.textContent = "> " + buffer.toUpperCase();
    clearTimeout(window.typeTimer);
    window.typeTimer = setTimeout(() => { buffer = ""; feedback.textContent = ""; feedback.classList.remove("active"); }, 3000);
});
</script>
</body>
</html>
